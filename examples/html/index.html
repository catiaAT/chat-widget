<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rasa Chat Widget - Test</title>
    <script
      type="module"
      src="./rasa-chatwidget/rasa-chatwidget.esm.js?v=98"
    ></script>
    <link
      rel="stylesheet"
      href="./rasa-chatwidget/rasa-chatwidget.css?v=98"
    />

    <style>
      /* Portal das Finanças color scheme */
      :root {
        --color-primary: #003d6b;      /* Azul marinho */
        --color-secondary: #005eb8;    /* Azul claro */
        --color-text: #333333;
        --color-text-light: #666666;
        --color-border: #e0e0e0;
        --color-background: #f9f9f9;
      }

      /* Disclaimer overlay styling */
      #disclaimer-overlay {
        position: fixed;
        bottom: 111px;
        right: 20px;
        width: 307px;
        height: 66vh;
        max-height: 688px;
        background: linear-gradient(135deg, #ffffff 0%, #f5f9fc 100%);
        backdrop-filter: blur(8px);
        z-index: 999999999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 28px;
        border-radius: 12px;
        border: 1px solid rgba(0, 61, 107, 0.1);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      #disclaimer-overlay.visible {
        opacity: 1;
        pointer-events: all;
      }

      .disclaimer-content {
        max-width: 280px;
        text-align: center;
      }

      .disclaimer-content h2 {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
        font-size: 20px;
        font-weight: 700;
        color: var(--color-primary);
        margin: 0 0 12px;
        letter-spacing: -0.3px;
      }

      .disclaimer-content p {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
        font-size: 13px;
        line-height: 1.7;
        color: var(--color-text-light);
        margin: 0 0 20px;
        font-weight: 400;
      }

      .disclaimer-content p:last-of-type {
        margin-bottom: 28px;
      }

      .disclaimer-accept-btn {
        background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
        color: white;
        border: none;
        border-radius: 8px;
        padding: 11px 28px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.3px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 12px rgba(0, 61, 107, 0.2);
      }

      .disclaimer-accept-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 61, 107, 0.3);
      }

      .disclaimer-accept-btn:active {
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <rasa-chatbot-widget
      id="chat-widget"
      widget-title="Ajuda Online - LLM poc"
      server-url="https://assistant.dev.catiabot.pt"
      rest-enabled="true"
      initial-payload=""
      enable-feedback="false"
      feedback-question-text="Gostaria de classificar esta conversa?"
      feedback-thank-you-text="Obrigado por classificar!"
      downloadable="true"
      restart-enabled="true"
      rasa-typing-indicator="true"
      toggle-full-screen="true"
      font-family="Verdana, sans-serif"
      auto-open="false"
    >
      <!-- Disclaimer injected into widget slot -->
      <div id="disclaimer-overlay">
        <div class="disclaimer-content">
          <h2>Bem-vindo</h2>
          <p>Este assistente virtual destina-se a fins informativos. As respostas são geradas automaticamente e não substituem aconselhamento profissional.</p>
          <p>Ao continuar, aceita os nossos termos de serviço e política de privacidade.</p>
          <button id="accept-btn" class="disclaimer-accept-btn">Aceitar e continuar</button>
        </div>
      </div>

      <style>
        :root {
          --color-primary: #003d6b;     /* Portal das Finanças blue */
          --color-secondary: #005eb8;   /* Secondary blue */
        }
      </style>
    </rasa-chatbot-widget>

    <script>
      (function() {
        const widget = document.getElementById('chat-widget');
        const overlay = document.getElementById('disclaimer-overlay');
        const acceptBtn = document.getElementById('accept-btn');
        const STORAGE_KEY = 'disclaimer_accepted';

        // Clear disclaimer acceptance on page load to start fresh
        // (or comment this line if you want it to persist across page reloads)
        sessionStorage.removeItem(STORAGE_KEY);

        // When widget opens, show disclaimer only if not yet accepted
        widget.addEventListener('chatWidgetOpened', function() {
          // Check if disclaimer was already accepted this session
          const isAccepted = sessionStorage.getItem(STORAGE_KEY) === 'true';
          
          console.log('Widget opened. Disclaimer accepted:', isAccepted);
          
          if (!isAccepted) {
            console.log('Showing disclaimer overlay');
            setTimeout(() => {
              overlay.classList.add('visible');
            }, 100);
          } else {
            console.log('Hiding disclaimer overlay and triggering payload');
            overlay.classList.remove('visible');
            // Already accepted, trigger payload immediately
            widget.setAttribute('initial-payload', '/restart');
          }
        });

        // When widget closes, hide disclaimer
        widget.addEventListener('chatWidgetClosed', function() {
          overlay.classList.remove('visible');
        });

        // When user accepts, hide disclaimer and trigger payload
        acceptBtn.addEventListener('click', function() {
          overlay.classList.remove('visible');
          // Save acceptance in session storage
          sessionStorage.setItem(STORAGE_KEY, 'true');
          console.log('Disclaimer accepted, saved to sessionStorage');
          // Trigger the payload to start conversation
          setTimeout(() => {
            widget.setAttribute('initial-payload', '/restart');
          }, 300);
        });
      })();
    </script>
  </body>
</html>
