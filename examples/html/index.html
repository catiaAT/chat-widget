<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rasa Chat Widget - Test</title>
    <script
      type="module"
      src="./rasa-chatwidget/rasa-chatwidget.esm.js?v=119"
    ></script>
    <link
      rel="stylesheet"
      href="./rasa-chatwidget/rasa-chatwidget.css?v=119"
    />
    <link rel="stylesheet" href="./rasa-chatwidget/widget-theme.css?v=1" />
    <style>
      body {
        background-image: url('./rasa-chatwidget/assets/images/fundo_teste.JPG');
        background-size: cover;
        background-repeat: no-repeat;
        background-attachment: fixed;
      }
    </style>
  </head>
  <body>
    <!-- old server-url="https://catia.portaldasfinancas.gov.pt" -->
    <!-- old server-url="http://localhost:5005" -->
    <rasa-chatbot-widget
      id="chat-widget"
      widget-title="Ajuda Online - LLM poc"
      server-url="https://catia.portaldasfinancas.gov.pt"
      widget-icon="./rasa-chatwidget/assets/images/catia_horizontal.png"
      bot-icon="./rasa-chatwidget/assets/images/catia_vertical.png"
      rest-enabled="false"
      initial-payload=""
      enable-feedback="true"
      feedback-question-text="Gostaria de classificar esta conversa?"
      feedback-thank-you-text="Obrigado por classificar!"
      downloadable="false"
      restart-enabled="true"
      rasa-typing-indicator="true"
      toggle-full-screen="true"
      font-family="Verdana, sans-serif"
      auto-open="false"
      input-message-placeholder="Escreva a sua mensagem..."
      message-metadata='{"source":"html-example","tenant":"at"}'
      disclaimer-enabled="true"
      disclaimer-storage-key="disclaimer_accepted"
      disclaimer-title="Bem-vindo"
      disclaimer-text="As informações que enviar são utilizadas apenas para lhe prestar esclarecimentos, não sendo utilizadas para efeitos da sua situação tributária específica.&#10;&#10;Não abrangido pelo artigo 68.º da Lei Geral Tributária. Não necessita de enviar dados pessoais que permitam a sua identificação por parte da AT. Para processamento e arquivo dos dados deste sistema, a AT poderá recorrer a serviços de computação na &quot;cloud&quot;.&#10;&#10;A utilização deste serviço requer um &quot;cookie&quot; mensal para agregar as interações do mesmo utilizador nesse período.&#10;&#10;Para melhoria do serviço prestado, são arquivadas até 180 dias as conversas mantidas, bem como o seu IP e as versões do sistema operativo e navegador de internet."
      disclaimer-link-prefix-text="Consulte a"
      disclaimer-link-text="Política de Privacidade e Segurança da AT"
      disclaimer-link-url="https://info.portaldasfinancas.gov.pt/pt/quem_somos/privacidade/Pages/privacidade.aspx"
      disclaimer-accept-button-text="Aceitar e continuar"
      disclaimer-initial-payload="/canal_entrada_principal_AT"
    ></rasa-chatbot-widget>

    <script>
      (function() {
        const widget = document.getElementById('chat-widget');

        function attachSocketDebugLogs() {
          const socket = widget?.client?.socket;
          if (!socket || socket.__debugLogsAttached) {
            return;
          }

          socket.__debugLogsAttached = true;
          socket.on('connect', () => console.log('[socket] connected:', socket.id));
          socket.on('disconnect', (reason) => console.log('[socket] disconnected:', reason));
          socket.on('connect_error', (error) => console.error('[socket] connect_error:', error?.message || error));
          socket.on('bot_uttered', (payload) => console.log('[socket] bot_uttered:', payload));
          socket.io?.on('reconnect_attempt', (attempt) => console.log('[socket] reconnect_attempt:', attempt));
          socket.io?.on('reconnect', (attempt) => console.log('[socket] reconnected on attempt:', attempt));
        }

        // When widget opens
        widget.addEventListener('chatWidgetOpened', function() {
          attachSocketDebugLogs();
        });

        widget.addEventListener('chatWidgetSentMessage', function(event) {
          console.log('[widget] sent:', event.detail);
        });

        widget.addEventListener('chatWidgetReceivedMessage', function(event) {
          console.log('[widget] received:', event.detail);
          const metadata = event?.detail?.metadata;
          if (metadata !== undefined) {
            console.log('[widget] received metadata:', metadata);
          }
        });

        setTimeout(attachSocketDebugLogs, 800);
      })();
    </script>
  </body>
</html>
